name: Build and Push Docker Image

on:
    push:
        branches: [main]
    workflow_dispatch:

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: wang25669/rewardms

permissions:
    contents: read
    packages: write

jobs:
    prepare:
        runs-on: ubuntu-latest
        outputs:
            image: ${{ steps.meta.outputs.image }}
            version: ${{ steps.meta.outputs.version }}
            sha_tag: ${{ steps.meta.outputs.sha_tag }}
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Read image metadata
              id: meta
              run: |
                  VERSION=$(node -p "require('./package.json').version")
                  echo "image=${REGISTRY}/${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
                  echo "version=$VERSION" >> "$GITHUB_OUTPUT"
                  echo "sha_tag=sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

    build:
        needs: prepare
        strategy:
            fail-fast: false
            matrix:
                include:
                    - platform: linux/amd64
                      runner: ubuntu-latest
                      suffix: amd64
                    - platform: linux/arm64
                      runner: ubuntu-24.04-arm
                      suffix: arm64
        runs-on: ${{ matrix.runner }}

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and push architecture image
              uses: docker/build-push-action@v5
              with:
                  context: .
                  platforms: ${{ matrix.platform }}
                  push: true
                  provenance: false
                  sbom: false
                  tags: |
                      ${{ needs.prepare.outputs.image }}:build-${{ github.sha }}-${{ matrix.suffix }}
                  cache-from: type=gha,scope=${{ matrix.suffix }}
                  cache-to: type=gha,mode=max,scope=${{ matrix.suffix }}

    publish:
        needs: [prepare, build]
        runs-on: ubuntu-latest

        steps:
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Create and push multi-arch manifests
              run: |
                  IMAGE="${{ needs.prepare.outputs.image }}"
                  VERSION="${{ needs.prepare.outputs.version }}"
                  SHA_TAG="${{ needs.prepare.outputs.sha_tag }}"
                  AMD64="${IMAGE}:build-${GITHUB_SHA}-amd64"
                  ARM64="${IMAGE}:build-${GITHUB_SHA}-arm64"

                  docker buildx imagetools create -t "${IMAGE}:latest" "${AMD64}" "${ARM64}"
                  docker buildx imagetools create -t "${IMAGE}:${VERSION}" "${AMD64}" "${ARM64}"
                  docker buildx imagetools create -t "${IMAGE}:${SHA_TAG}" "${AMD64}" "${ARM64}"
